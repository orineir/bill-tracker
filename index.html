    .cat-bar-amount.dark-text { color: var(--ink); }
    .cat-bar-pct {
      width: 50px;
      text-align: right;
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }
    /* 饼图增强 */
    .pie-chart {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .pie-svg {
      width: 150px; height: 150px;
    }
    .pie-center-text {
      position: absolute;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .pie-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .pie-legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .pie-legend-name { color: var(--ink); font-weight: 500; }
    .pie-legend-val { color: var(--muted); font-family: var(--font-mono); margin-left: auto; }
    /* 月度对比 */
    .month-compare {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .month-compare-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .month-compare-label {
      width: 60px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }
    .month-compare-bars {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .month-compare-bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .month-compare-type {
      width: 24px;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .month-compare-type.expense-type { color: var(--accent); }
    .month-compare-type.income-type { color: var(--accent2); }
    .month-compare-track {
      flex: 1;
      height: 16px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .month-compare-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .month-compare-fill.expense-fill { background: var(--accent); }
    .month-compare-fill.income-fill { background: var(--accent2); }
    .month-compare-val {
      width: 70px;
      text-align: right;
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: var(--ink);
      color: var(--bg2);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== 页面切换 ===== */
    .page-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .page-section.active { display: block; }

    /* ===== 筛选标签 ===== */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--rule);
      background: var(--bg2);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      font-family: var(--font);
    }
    .filter-tab.active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--bg2);
    }

    /* ===== 日期选择器 ===== */
    .date-picker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1.5px solid var(--rule);
      border-radius: 12px;
    }
    .date-nav-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid var(--rule);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .date-nav-btn:hover { border-color: var(--ink); background: var(--ink); color: var(--bg2); }
    .date-nav-btn svg { width: 14px; height: 14px; }
    .date-today-btn {
      width: auto;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font);
    }
    .date-picker-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      outline: none;
      cursor: pointer;
    }
    .date-picker-input::-webkit-calendar-picker-indicator {
      opacity: 0.5;
      cursor: pointer;
    }
    .record-date-header {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== 日历弹窗 ===== */
    .calendar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .calendar-overlay.show { display: flex; }
    .calendar-popup {
      background: var(--bg2);
      border: 1.5px solid var(--rule);
      border-radius: 16px;
      padding: 16px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .calendar-title {
      font-size: 15px;
      font-weight: 700;
    }
    .calendar-nav {
      display: flex;
      gap: 4px;
    }
    .calendar-nav button {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--rule);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.2s ease;
    }
    .calendar-nav button:hover { border-color: var(--ink); background: var(--ink); color: var(--bg2); }
    .calendar-nav button svg { width: 14px; height: 14px; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      padding: 6px 0;
    }
    .calendar-day {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1.5px solid transparent;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
      padding: 2px;
    }
    .calendar-day:hover { background: var(--bg); border-color: var(--rule); }
    .calendar-day.selected {
      background: var(--ink);
      color: var(--bg2);
    }
    .calendar-day.selected:hover { opacity: 0.9; }
    .calendar-day.other-month { color: var(--muted); opacity: 0.5; }
    .calendar-day-num {
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
    }
    .calendar-day-marks {
      display: flex;
      gap: 2px;
      margin-top: 2px;
      height: 6px;
      align-items: center;
      justify-content: center;
    }
    .calendar-mark {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .calendar-mark.income { background: var(--accent2); }
    .calendar-mark.expense { background: var(--accent); }
    .calendar-close {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid var(--rule);
      background: transparent;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .calendar-close:hover { border-color: var(--ink); background: var(--ink); color: var(--bg2); }

    /* ===== 月总结弹窗 ===== */
    .summary-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .summary-overlay.show { display: flex; }
    .summary-popup {
      background: var(--bg2);
      border: 1.5px solid var(--rule);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: popIn 0.25s ease;
    }
    .summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .summary-title {
      font-size: 16px;
      font-weight: 700;
    }
    .summary-close {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--rule);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    .summary-close:hover { border-color: var(--ink); color: var(--ink); }
    .summary-close svg { width: 14px; height: 14px; }
    .summary-month-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1.5px solid var(--rule);
      border-radius: 10px;
    }
    .summary-month-selector button {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--rule);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .summary-month-selector button:hover { border-color: var(--ink); background: var(--ink); color: var(--bg2); }
    .summary-month-selector button svg { width: 14px; height: 14px; }
    .summary-month-text {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }
    .summary-section {
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg);
      border: 1.5px solid var(--rule);
      border-radius: 12px;
    }
    .summary-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--rule);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { font-weight: 500; }
    .summary-value {
      font-family: var(--font-mono);
      font-weight: 700;
    }
    .summary-value.income { color: var(--accent2); }
    .summary-value.expense { color: var(--accent); }
    .summary-value.total { color: var(--ink); font-size: 15px; }
    .summary-empty {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .record-date-header:first-child { margin-top: 0; }
    .record-date-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .record-day-summary {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      margin-left: auto;
    }
    .record-day-summary.expense-sum { color: var(--accent); }
    .record-day-summary.income-sum { color: var(--accent2); }

    /* ===== 房屋管理页 ===== */
    .house-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .house-header-title {
      font-size: 18px;
      font-weight: 700;
    }
    .house-add-btn {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--rule);
      background: transparent;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .house-add-btn:hover { border-color: var(--ink); background: var(--ink); color: var(--bg2); }
    .house-add-btn svg { width: 14px; height: 14px; }
    .house-card {
      background: var(--bg2);
      border: 1.5px solid var(--rule);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.25s ease;
    }
    .house-card:hover { box-shadow: var(--shadow); }
    .house-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .house-card-name {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .house-card-name span { font-size: 20px; }
    .house-card-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .house-card-actions button {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid var(--rule);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    .house-card-actions button:hover { border-color: var(--ink); color: var(--ink); }
    .house-card-actions button svg { width: 16px; height: 16px; }
    .house-card-actions .house-del-btn:hover { border-color: var(--danger); color: var(--danger); }
    .house-meter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .meter-card {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 12px;
    }
    .meter-card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .meter-card-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .meter-card-value.water-color { color: #457b9d; }
    .meter-card-value.elec-color { color: #e9c46a; }
    .meter-card-cost {
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--accent);
    }
    .meter-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .meter-input-group {
      flex: 1;
    }
    .meter-input-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .meter-input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--rule);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      background: var(--bg2);
      outline: none;
      transition: border-color 0.2s;
    }
    .meter-input:focus { border-color: var(--accent); }
    .meter-save-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: var(--ink);
      color: var(--bg2);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .meter-save-btn:hover { opacity: 0.85; }
    .house-history {
      margin-top: 10px;
      border-top: 1px solid var(--rule);
      padding-top: 10px;
    }
    .house-history-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .history-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--rule);
    }
    .history-row:last-child { border-bottom: none; }
    .history-month {
      width: 50px;
      font-weight: 600;
      color: var(--ink);
      flex-shrink: 0;
    }
    .history-usage {
      flex: 1;
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .history-cost {
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
    }
    .price-setting {
      background: var(--bg2);
      border: 1.5px solid var(--rule);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .price-setting-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .price-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .price-row:last-child { margin-bottom: 0; }
    .price-label {
      font-size: 13px;
      font-weight: 500;
      width: 80px;
      flex-shrink: 0;
    }
    .price-input {
      flex: 1;
      padding: 8px 10px;
      border: 1.5px solid var(--rule);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--ink);
      background: var(--bg);
      outline: none;
    }
    .price-input:focus { border-color: var(--accent); }
    .price-unit {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      width: 60px;
      flex-shrink: 0;
    }
    .house-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .house-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

    /* ===== 响应式 ===== */
    @media (max-width: 400px) {
      .category-grid { grid-template-columns: repeat(3, 1fr); }
      .stats-grid { gap: 8px; }
      .stat-card { padding: 14px 12px; }
      .stat-value { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- 顶部 -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="logo">
        <div class="logo-icon">¥</div>
        <div class="logo-text">记账本</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btnManageCat" title="管理分类">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- 首页 -->
    <section class="page-section active" id="pageHome">
      <div class="stats-grid">
        <div class="stat-card income" id="cardIncome" style="cursor:pointer;">
          <div class="stat-label">本月收入</div>
          <div class="stat-value income" id="totalIncome">¥0.00</div>
        </div>
        <div class="stat-card expense" id="cardExpense" style="cursor:pointer;">
          <div class="stat-label">本月支出</div>
          <div class="stat-value expense" id="totalExpense">¥0.00</div>
        </div>
      </div>

      <div class="section-title">记录查询</div>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="expense">支出</button>
        <button class="filter-tab" data-filter="income">收入</button>
      </div>
      <div class="date-picker-row">
        <button class="date-nav-btn" id="btnPrevDay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <input type="date" class="date-picker-input" id="homeDatePicker">
        <button class="date-nav-btn" id="btnNextDay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="date-nav-btn date-today-btn" id="btnToday" title="回到今天">今天</button>
      </div>
      <div class="record-list" id="recordList">
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">暂无记录，点击右下角 + 添加</div>
        </div>
      </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // 阻止下拉刷新
    let startY = 0;
    document.addEventListener('touchstart', function(e) {
      startY = e.touches[0].pageY;
    }, { passive: true });
    document.addEventListener('touchmove', function(e) {
      const y = e.touches[0].pageY;
      const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      // 如果页面在顶部且向下滑动，阻止默认行为
      if (scrollTop <= 0 && y > startY) {
        e.preventDefault();
      }
    }, { passive: false });

    // ===================== 数据 =====================
    const defaultCategories = [
      { id: 'food', name: '餐饮', icon: '🍜', type: 'expense' },
      { id: 'transport', name: '交通', icon: '🚌', type: 'expense' },
      { id: 'shopping', name: '购物', icon: '🛍️', type: 'expense' },
      { id: 'entertainment', name: '娱乐', icon: '🎬', type: 'expense' },
      { id: 'rent', name: '房租', icon: '🏠', type: 'expense' },
      { id: 'water', name: '水费', icon: '💧', type: 'expense' },
      { id: 'electricity', name: '电费', icon: '⚡', type: 'expense' },
      { id: 'property', name: '物业', icon: '🏢', type: 'expense' },
      { id: 'medical', name: '医疗', icon: '🏥', type: 'expense' },
      { id: 'education', name: '教育', icon: '📚', type: 'expense' },
      { id: 'other', name: '其他', icon: '📦', type: 'expense' },
      { id: 'salary', name: '工资', icon: '💰', type: 'income' },
      { id: 'rent_income', name: '租金', icon: '🏠', type: 'income' },
      { id: 'water_income', name: '水费收入', icon: '💧', type: 'income' },
      { id: 'elec_income', name: '电费收入', icon: '⚡', type: 'income' },
      { id: 'bonus', name: '奖金', icon: '🎁', type: 'income' },
      { id: 'investment', name: '理财', icon: '📈', type: 'income' },
    ];

    let categories = (JSON.parse(localStorage.getItem('bt_categories')) || defaultCategories).map(c => {
      const def = defaultCategories.find(d => d.id === c.id);
      return { ...c, type: c.type || (def ? def.type : 'expense') };
    });
    // 自动补全新增分类
    defaultCategories.forEach(def => {
      if (!categories.find(c => c.id === def.id)) {
        categories.push({ ...def });
      }
    });
    let records = JSON.parse(localStorage.getItem('bt_records')) || [];
    let currentType = 'expense';
    let currentCategory = null;
    let currentFilter = 'all';
    let homeDate = new Date(); // 首页日期筛选
    let statsType = 'expense';
    let statsYear = new Date().getFullYear();
    let statsMonth = new Date().getMonth();

    // ===================== 工具函数 =====================
    function saveData() {
      localStorage.setItem('bt_categories', JSON.stringify(categories));
      localStorage.setItem('bt_records', JSON.stringify(records));
    }

    function formatMoney(n) {
      return currentCurrency + Number(n).toFixed(2);
    }

    function formatDate(d) {
      const date = new Date(d);
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      const isYesterday = new Date(now - 86400000).toDateString() === date.toDateString();
      const timeStr = date.getHours().toString().padStart(2,'0') + ':' + date.getMinutes().toString().padStart(2,'0');
      if (isToday) return '今天 ' + timeStr;
      if (isYesterday) return '昨天 ' + timeStr;
      return (date.getMonth()+1) + '/' + date.getDate() + ' ' + timeStr;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function getMonthRecords(year, month) {
      const y = year !== undefined ? year : new Date().getFullYear();
      const m = month !== undefined ? month : new Date().getMonth();
      return records.filter(r => {
        const d = new Date(r.date);
        return d.getFullYear() === y && d.getMonth() === m;
      });
    }

    // ===================== 渲染分类 =====================
    function renderCategories() {
      const grid = document.getElementById('categoryGrid');
      const typeCats = categories.filter(c => c.type === currentType);
      if (!typeCats.length) {
        grid.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">暂无分类</div>';
        return;
      }
      grid.innerHTML = typeCats.map(c => `
        <div class="category-item ${currentCategory === c.id ? 'active' : ''}" data-id="${c.id}">
          <span class="cat-icon">${c.icon}</span>
          <span class="cat-name">${c.name}</span>
        </div>
      `).join('');
      grid.querySelectorAll('.category-item').forEach(el => {
        el.addEventListener('click', () => {
          currentCategory = el.dataset.id;
          renderCategories();
        });
      });
      if (!currentCategory || !typeCats.find(c => c.id === currentCategory)) {
        currentCategory = typeCats[0].id;
      }
    }

    // ===================== 渲染记录列表 =====================
    function renderRecords() {
      const list = document.getElementById('recordList');
      const picker = document.getElementById('homeDatePicker');
      const dateStr = homeDate.toISOString().slice(0, 10);
      picker.value = dateStr;

      // 筛选选中日期的记录
      let filtered = records.filter(r => {
        const rd = new Date(r.date);
        return rd.getFullYear() === homeDate.getFullYear() && rd.getMonth() === homeDate.getMonth() && rd.getDate() === homeDate.getDate();
      });
      if (currentFilter !== 'all') filtered = filtered.filter(r => r.type === currentFilter);
      filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

      if (!filtered.length) {
        const weekDays = ['日','一','二','三','四','五','六'];
        const dayLabel = (homeDate.getMonth()+1) + '月' + homeDate.getDate() + '日 周' + weekDays[homeDate.getDay()];

          <div class="empty-state">

        return `
          <div class="record-item ${r.type}">
            <div class="record-icon">${cat.icon}</div>
            <div class="record-info">
              <div class="record-title">${r.note || cat.name}</div>
              <div class="record-meta">
                <span>🕐 ${timeStr}</span>
                <span>🏷️ ${cat.name}</span>
              </div>
            </div>
            <div class="record-amount ${r.type}">${r.type === 'income' ? '+' : '-'}${formatMoney(r.amount)}</div>
            <button class="record-delete" data-id="${r.id}" title="删除">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        `;
      }).join('');

      // 当日汇总
      const dayExpense = filtered.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
      const dayIncome = filtered.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
      const weekDays = ['日','一','二','三','四','五','六'];
      const dayLabel = (homeDate.getMonth()+1) + '月' + homeDate.getDate() + '日 周' + weekDays[homeDate.getDay()];
      let summaryHtml = `<div class="record-date-header">${dayLabel}`;
      if (dayExpense) summaryHtml += `<span class="record-day-summary expense-sum">支 ${formatMoney(dayExpense)}</span>`;
      if (dayIncome) summaryHtml += `<span class="record-day-summary income-sum">收 ${formatMoney(dayIncome)}</span>`;
      summaryHtml += `</div>`;
      list.insertAdjacentHTML('afterbegin', summaryHtml);

      list.querySelectorAll('.record-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          records = records.filter(r => r.id !== id);
          saveData();
          renderRecords();
          updateStats();
          renderCharts();
          showToast('已删除');

    // ===================== 统计 =====================
    function updateStats() {
      const monthRecs = getMonthRecords();
      const income = monthRecs.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
      const expense = monthRecs.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
      document.getElementById('totalIncome').textContent = formatMoney(income);
      document.getElementById('totalExpense').textContent = formatMoney(expense);
    }

    // ===================== 图表颜色 =====================
    const chartColors = ['#e07a5f','#81b29a','#f2cc8f','#3d405b','#9a9590','#d4a373','#a8dadc','#e63946','#457b9d','#6d6875','#b5838d','#ffb4a2'];

    function renderCharts() {
      const monthRecs = getMonthRecords(statsYear, statsMonth);
      const typeRecs = monthRecs.filter(r => r.type === statsType);
      const allExpense = monthRecs.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
      const allIncome = monthRecs.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
      const balance = allIncome - allExpense;

      // 月份标签
      document.getElementById('statsMonthLabel').textContent = statsYear + '年' + (statsMonth + 1) + '月';

      // 汇总卡片
      document.getElementById('statsSummary').innerHTML = `
        <div class="stats-summary-item">
          <div class="stats-summary-label">总支出</div>
          <div class="stats-summary-value expense-color">${formatMoney(allExpense)}</div>
        </div>
        <div class="stats-summary-item">
          <div class="stats-summary-label">总收入</div>
          <div class="stats-summary-value income-color">${formatMoney(allIncome)}</div>
        </div>
        <div class="stats-summary-item" style="grid-column: 1 / -1;">
          <div class="stats-summary-label">结余</div>
          <div class="stats-summary-value balance-color">${balance >= 0 ? '+' : ''}${formatMoney(balance)}</div>
        </div>
      `;

      // ===== 分类汇总 =====
      const catTotals = {};
      typeRecs.forEach(r => {
        catTotals[r.category] = (catTotals[r.category] || 0) + r.amount;
      });
      const catEntries = Object.entries(catTotals).sort((a,b) => b[1] - a[1]);
      const typeTotal = catEntries.reduce((s,[,v]) => s + v, 0);

      if (!catEntries.length) {
        const emptyHtml = '<div class="empty-state" style="padding:24px;"><div class="empty-text">暂无' + (statsType === 'expense' ? '支出' : '收入') + '数据</div></div>';
        document.getElementById('catBarChart').innerHTML = emptyHtml;
        document.getElementById('pieChart').innerHTML = emptyHtml;
      } else {
        // ===== 分类直方图 =====
        const maxCatAmt = catEntries[0][1];
        const barHtml = catEntries.map(([catId, amount], i) => {
          const cat = categories.find(c => c.id === catId) || { name: '未知', icon: '?' };
          const pct = (amount / maxCatAmt * 100);
          const color = chartColors[i % chartColors.length];
          const isDark = pct < 30;
          return `
            <div class="cat-bar-row">
              <div class="cat-bar-info">
                <span class="cat-bar-icon">${cat.icon}</span>
                <span class="cat-bar-name">${cat.name}</span>
              </div>
              <div class="cat-bar-track">
                <div class="cat-bar-fill" style="width:${pct}%;background:${color};">
                  <span class="cat-bar-amount ${isDark ? 'dark-text' : ''}">${formatMoney(amount)}</span>
                </div>
              </div>
              <div class="cat-bar-pct">${(amount/typeTotal*100).toFixed(1)}%</div>
            </div>
          `;
        }).join('');
        document.getElementById('catBarChart').innerHTML = barHtml;

        // ===== 分类饼图 =====
        let svgPaths = '';
        let legendHtml = '';
        let startAngle = -Math.PI / 2;
        const r = 65, cx = 75, cy = 75;

        catEntries.forEach(([catId, amount], i) => {
          const cat = categories.find(c => c.id === catId) || { name: '未知', icon: '' };
          const angle = (amount / typeTotal) * Math.PI * 2;
          const endAngle = startAngle + angle;
          const x1 = cx + r * Math.cos(startAngle);
          const y1 = cy + r * Math.sin(startAngle);
          const x2 = cx + r * Math.cos(endAngle);
          const y2 = cy + r * Math.sin(endAngle);
          const largeArc = angle > Math.PI ? 1 : 0;
          svgPaths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z" fill="${chartColors[i % chartColors.length]}" stroke="var(--bg2)" stroke-width="2"/>`;
          startAngle = endAngle;

          legendHtml += `
            <div class="pie-legend-item">
              <div class="pie-legend-dot" style="background:${chartColors[i % chartColors.length]}"></div>
              <span class="pie-legend-name">${cat.icon} ${cat.name}</span>
              <span class="pie-legend-val">${formatMoney(amount)} ${(amount/typeTotal*100).toFixed(1)}%</span>
            </div>
          `;
        });

        document.getElementById('pieChart').innerHTML = `
          <svg class="pie-svg" viewBox="0 0 150 150">${svgPaths}</svg>
          <div class="pie-legend">${legendHtml}</div>
        `;
      }

      // ===== 近6月收支对比 =====
      const monthCompareData = [];
      for (let i = 5; i >= 0; i--) {
        let my = statsMonth - i;
        let yy = statsYear;
        if (my < 0) { my += 12; yy--; }
        const mRecs = getMonthRecords(yy, my);
        const mExpense = mRecs.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
        const mIncome = mRecs.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
        monthCompareData.push({ label: (my+1) + '月', expense: mExpense, income: mIncome });
      }
      const maxMonthAmt = Math.max(...monthCompareData.flatMap(d => [d.expense, d.income]), 1);
      const compareHtml = monthCompareData.map(d => {
        const ePct = (d.expense / maxMonthAmt * 100);
        const iPct = (d.income / maxMonthAmt * 100);
        return `
          <div class="month-compare-row">
            <div class="month-compare-label">${d.label}</div>
            <div class="month-compare-bars">
              <div class="month-compare-bar-row">
                <div class="month-compare-type expense-type">支出</div>
                <div class="month-compare-track">
                  <div class="month-compare-fill expense-fill" style="width:${ePct}%;"></div>
                </div>
                <div class="month-compare-val">${d.expense ? formatMoney(d.expense) : '-'}</div>
              </div>
              <div class="month-compare-bar-row">
                <div class="month-compare-type income-type">收入</div>
                <div class="month-compare-track">
                  <div class="month-compare-fill income-fill" style="width:${iPct}%;"></div>
                </div>
                <div class="month-compare-val">${d.income ? formatMoney(d.income) : '-'}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('monthCompare').innerHTML = compareHtml;
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      document.getElementById('calendarTitle').textContent = calYear + '年' + (calMonth + 1) + '月';

      const weekdays = ['日','一','二','三','四','五','六'];
      let html = weekdays.map(d => `<div class="calendar-weekday">${d}</div>`).join('');

      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const prevDays = new Date(calYear, calMonth, 0).getDate();

      // 上月日期
      for (let i = firstDay - 1; i >= 0; i--) {
        html += `<div class="calendar-day other-month"><div class="calendar-day-num">${prevDays - i}</div></div>`;
      }

      // 当月日期
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = calYear + '-' + (calMonth + 1).toString().padStart(2, '0') + '-' + d.toString().padStart(2, '0');
        const isSelected = homeDate.getFullYear() === calYear && homeDate.getMonth() === calMonth && homeDate.getDate() === d;

        // 检查当天是否有收入/支出记录
        const dayRecs = records.filter(r => r.date.startsWith(dateStr));
        const hasIncome = dayRecs.some(r => r.type === 'income');
        const hasExpense = dayRecs.some(r => r.type === 'expense');

        let marks = '';
        if (hasIncome) marks += '<div class="calendar-mark income"></div>';
        if (hasExpense) marks += '<div class="calendar-mark expense"></div>';

        html += `
          <div class="calendar-day ${isSelected ? 'selected' : ''}" data-date="${dateStr}">
            <div class="calendar-day-num">${d}</div>
            <div class="calendar-day-marks">${marks}</div>
          </div>
        `;
      }

      // 下月日期
      const totalCells = firstDay + daysInMonth;
      const nextDays = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let d = 1; d <= nextDays; d++) {
        html += `<div class="calendar-day other-month"><div class="calendar-day-num">${d}</div></div>`;
      }

      grid.innerHTML = html;

      grid.querySelectorAll('.calendar-day[data-date]').forEach(day => {
        day.addEventListener('click', () => {
          homeDate = new Date(day.dataset.date + 'T12:00:00');
          closeCalendar();
          renderRecords();
        });
      });
    }

        if (page === 'stats') renderCharts();
      });
    });

    // 首页统计卡片点击跳转
    document.getElementById('cardIncome').addEventListener('click', () => {
      statsType = 'income';
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelector('.nav-item[data-page="stats"]').classList.add('active');
      document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
      document.getElementById('pageStats').classList.add('active');
      document.querySelectorAll('.stats-type-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.stats-type-btn[data-stats-type="income"]').classList.add('active');
      renderCharts();
    });
    document.getElementById('cardExpense').addEventListener('click', () => {
      statsType = 'expense';
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelector('.nav-item[data-page="stats"]').classList.add('active');
      document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
      document.getElementById('pageStats').classList.add('active');
      document.querySelectorAll('.stats-type-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.stats-type-btn[data-stats-type="expense"]').classList.add('active');
      renderCharts();
    });

    // ===================== 统计页事件 =====================
    // 统计类型切换
    document.querySelectorAll('.stats-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        statsType = btn.dataset.statsType;
        document.querySelectorAll('.stats-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCharts();
      });
    });

    // 月份切换
    document.getElementById('btnPrevMonth').addEventListener('click', () => {
      statsMonth--;
      if (statsMonth < 0) { statsMonth = 11; statsYear--; }
      renderCharts();
    });
    document.getElementById('btnNextMonth').addEventListener('click', () => {
      statsMonth++;
      if (statsMonth > 11) { statsMonth = 0; statsYear++; }
      renderCharts();
    });

    // ===================== 房屋管理 =====================
    let houses = [];
    try {
      const raw = localStorage.getItem('bt_houses');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) houses = parsed;
      }
    } catch (e) { houses = []; }
    let elecUnitPrice = parseFloat(localStorage.getItem('bt_elec_price')) || 0;
    let waterUnitPrice = parseFloat(localStorage.getItem('bt_water_price')) || 0;

    function saveHouseData() {
      localStorage.setItem('bt_houses', JSON.stringify(houses));
      localStorage.setItem('bt_elec_price', elecUnitPrice.toString());
      localStorage.setItem('bt_water_price', waterUnitPrice.toString());
    }

    // 将房屋收支同步到记账本
    function syncHouseToRecords(houseName, catId, amount, monthStr, note) {
      // 查找当月是否已有该房子该分类的记录
      const existIdx = records.findIndex(r =>
        r.type === 'income' &&
        r.category === catId &&
        r.note === note
      );
      if (existIdx >= 0) {
        records[existIdx].amount = amount;
        records[existIdx].date = monthStr + '-15 12:00';
      } else {
        records.push({
          id: 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          type: 'income',
          category: catId,
          amount: amount,
          date: monthStr + '-15 12:00',
          note: note
        });
      }
      saveData();
      renderRecords();
      updateStats();
      renderCharts();
    }

    function renderHouses() {
      const list = document.getElementById('houseList');
      if (!list) return;
      document.getElementById('elecPrice').value = elecUnitPrice || '';
      document.getElementById('waterPrice').value = waterUnitPrice || '';

      if (!houses.length) {
        list.innerHTML = '<div class="house-empty"><div class="house-empty-icon">&#127968;</div><div class="empty-text">暂无房子，点击上方添加</div></div>';
        return;
      }

      list.innerHTML = houses.map((house, idx) => {
        const records = house.records || [];
        const rent = house.rent || 0;
        const rentRecords = house.rentRecords || [];
        const latest = records.length ? records[records.length - 1] : null;
        const prev = records.length > 1 ? records[records.length - 2] : null;
        const curElec = latest ? latest.elec : 0;
        const curWater = latest ? latest.water : 0;
        const isFirst = records.length === 1;
        // 首次录入不计算用量；后续：显示与上次的差值
        const usedElec = latest ? (prev ? Math.max(0, curElec - prev.elec) : 0) : 0;
        const usedWater = latest ? (prev ? Math.max(0, curWater - prev.water) : 0) : 0;
        const elecCost = usedElec * elecUnitPrice;
        const waterCost = usedWater * waterUnitPrice;
        const utilityCost = elecCost + waterCost;

        const rentHistoryHtml = rentRecords.slice(-6).reverse().map(r => `
          <div class="history-row">
            <div class="history-month">${r.month}</div>
            <div class="history-usage"><span>💰租金</span><span>${r.paid ? '✅已收' : '⏳待收'}</span></div>
            <div class="history-cost">${formatMoney(r.amount)}</div>
          </div>
        `).join('');

        const historyHtml = records.slice(-6).reverse().map((r, ri) => {
          const p = ri < records.length - 1 ? records[records.length - 2 - ri] : null;
          const uE = p ? Math.max(0, r.elec - p.elec) : r.elec;
          const uW = p ? Math.max(0, r.water - p.water) : r.water;
          const cost = uE * elecUnitPrice + uW * waterUnitPrice;
          return `
            <div class="history-row">
              <div class="history-month">${r.date}</div>
              <div class="history-usage"><span>⚡${Number(r.elec).toFixed(1)}度</span><span>💧${Number(r.water).toFixed(1)}m³</span></div>
              <div class="history-cost">${p ? '用量 ' + Number(uE).toFixed(1) + '度/' + Number(uW).toFixed(1) + 'm³' : '首次录入'}</div>
            </div>
          `;
        }).join('');

        const now = new Date();
        const curMonthStr = now.getFullYear() + '-' + (now.getMonth() + 1).toString().padStart(2, '0');
        const curRentRec = rentRecords.find(r => r.month === curMonthStr);
        const rentPaid = curRentRec ? curRentRec.paid : false;

        return `
          <div class="house-card">
            <div class="house-card-header">
              <div class="house-card-name"><span>🏠</span>${house.name}</div>
              <div class="house-card-actions">
                <button type="button" class="house-summary-btn" data-idx="${idx}" title="月总结" style="width:auto;padding:0 10px;font-size:11px;font-weight:600;font-family:var(--font);border-radius:8px;border:1.5px solid var(--rule);background:transparent;cursor:pointer;color:var(--ink);transition:all 0.2s ease;">
                  📊 月总结
                </button>
                <button type="button" class="house-edit-btn" data-idx="${idx}" title="编辑">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button type="button" class="house-del-btn" data-idx="${idx}" title="删除">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            </div>
            <div class="house-meter-grid">
              <div class="meter-card">
                <div class="meter-card-title">⚡ ${isFirst ? '当前电表读数' : '本月用电'}</div>
                <div class="meter-card-value elec-color">${isFirst ? Number(curElec).toFixed(1) + '度' : Number(usedElec).toFixed(1) + '度'}</div>
                <div class="meter-card-cost">${isFirst ? '下次录入后计算用量' : (elecCost ? '费用 ' + formatMoney(elecCost) : '未设置单价')}</div>
              </div>
              <div class="meter-card">
                <div class="meter-card-title">💧 ${isFirst ? '当前水表读数' : '本月用水'}</div>
                <div class="meter-card-value water-color">${isFirst ? Number(curWater).toFixed(1) + 'm³' : Number(usedWater).toFixed(1) + 'm³'}</div>
                <div class="meter-card-cost">${isFirst ? '下次录入后计算用量' : (waterCost ? '费用 ' + formatMoney(waterCost) : '未设置单价')}</div>
              </div>
            </div>
            <div class="meter-input-row">
              <div class="meter-input-group">
                <div class="meter-input-label">电表读数(度)</div>
                <input type="number" class="meter-input" id="elec_${idx}" value="${curElec}" step="0.1" min="0" placeholder="0">
              </div>
              <div class="meter-input-group">
                <div class="meter-input-label">水表读数(m³)</div>
                <input type="number" class="meter-input" id="water_${idx}" value="${curWater}" step="0.1" min="0" placeholder="0">
              </div>
              <button type="button" class="meter-save-btn" data-idx="${idx}">记录</button>
            </div>
            <div style="margin-top:12px;padding-top:12px;border-top:1.5px solid var(--rule);">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <div style="font-size:13px;font-weight:700;color:var(--ink);">💰 租金管理</div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--accent2);">${formatMoney(rent)}/月</span>
                  <button type="button" class="meter-save-btn" data-idx="${idx}" data-action="toggle-rent" style="background:${rentPaid ? 'var(--accent2)' : 'var(--ink)'};font-size:11px;">${rentPaid ? '已收租' : '标记收租'}</button>
                </div>
              </div>
              ${utilityCost > 0 ? `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">本月水电费 ${formatMoney(utilityCost)}，应收合计 <strong style="color:var(--ink);">${formatMoney(rent + utilityCost)}</strong></div>` : ''}
              ${rentRecords.length > 0 ? `<div class="house-history"><div class="house-history-title">租金记录</div>${rentHistoryHtml}</div>` : ''}
            </div>
            ${records.length > 0 ? `<div class="house-history"><div class="house-history-title">水电记录</div>${historyHtml}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    // ===================== 月总结 =====================
    let summaryHouseIdx = -1;
    let summaryYear = new Date().getFullYear();
    let summaryMonth = new Date().getMonth();

    function openSummary(idx) {
      summaryHouseIdx = idx;
      summaryYear = new Date().getFullYear();
      summaryMonth = new Date().getMonth();
      renderSummary();
      document.getElementById('summaryOverlay').classList.add('show');
    }
    function closeSummary() {
      document.getElementById('summaryOverlay').classList.remove('show');
    }

    function renderSummary() {
      const house = houses[summaryHouseIdx];
      if (!house) return;
      document.getElementById('summaryTitle').textContent = house.name + ' 月总结';
      document.getElementById('summaryMonthText').textContent = summaryYear + '年' + (summaryMonth + 1) + '月';

      const monthPrefix = summaryYear + '-' + (summaryMonth + 1).toString().padStart(2, '0');

      // 租金
      const rentRec = (house.rentRecords || []).find(r => r.month === monthPrefix);
      const rentAmount = house.rent || 0;
      const rentPaid = rentRec ? rentRec.paid : false;

      // 水电：找该月内的读数记录
      const monthRecs = (house.records || []).filter(r => r.date.startsWith(monthPrefix));
      let elecUsed = 0, waterUsed = 0, elecCost = 0, waterCost = 0;
      if (monthRecs.length >= 2) {
        const first = monthRecs[0];
        const last = monthRecs[monthRecs.length - 1];
        elecUsed = Math.max(0, last.elec - first.elec);
        waterUsed = Math.max(0, last.water - first.water);
        elecCost = elecUsed * elecUnitPrice;
        waterCost = waterUsed * waterUnitPrice;
      }
      const utilityTotal = elecCost + waterCost;
      const grandTotal = rentAmount + utilityTotal;

      let html = '';

      // 租金部分
      html += `
        <div class="summary-section">
          <div class="summary-section-title">租金</div>
          <div class="summary-row">
            <div class="summary-label">月租金</div>
            <div class="summary-value income">${formatMoney(rentAmount)}</div>
          </div>
          <div class="summary-row">
            <div class="summary-label">收租状态</div>
            <div class="summary-value ${rentPaid ? 'income' : 'expense'}">${rentPaid ? '✅ 已收租' : '⏳ 待收租'}</div>
          </div>
        </div>
      `;

      // 水电部分
      if (monthRecs.length >= 2) {
        html += `
          <div class="summary-section">
            <div class="summary-section-title">水电费</div>
            <div class="summary-row">
              <div class="summary-label">用电量</div>
              <div class="summary-value">${elecUsed} 度</div>
            </div>
            <div class="summary-row">
              <div class="summary-label">电费</div>
              <div class="summary-value expense">${formatMoney(elecCost)}</div>
            </div>
            <div class="summary-row">
              <div class="summary-label">用水量</div>
              <div class="summary-value">${waterUsed} m³</div>
            </div>
            <div class="summary-row">
              <div class="summary-label">水费</div>
              <div class="summary-value expense">${formatMoney(waterCost)}</div>
            </div>
            <div class="summary-row">
              <div class="summary-label">水电合计</div>
              <div class="summary-value expense">${formatMoney(utilityTotal)}</div>
            </div>
          </div>
        `;
      } else if (monthRecs.length === 1) {
        html += `
          <div class="summary-section">
            <div class="summary-section-title">水电费</div>
            <div class="summary-empty">该月仅有 1 次读数记录，无法计算用量<br>需要至少 2 次记录才能计算差值</div>
          </div>
        `;
      } else {
        html += `
          <div class="summary-section">
            <div class="summary-section-title">水电费</div>
            <div class="summary-empty">该月暂无水电读数记录</div>
          </div>
        `;
      }

      // 总计
      html += `
        <div class="summary-section">
          <div class="summary-section-title">应收合计</div>
          <div class="summary-row">
            <div class="summary-label">租金</div>
            <div class="summary-value income">+${formatMoney(rentAmount)}</div>
          </div>
          <div class="summary-row">
            <div class="summary-label">水电费</div>
            <div class="summary-value expense">+${formatMoney(utilityTotal)}</div>
          </div>
          <div class="summary-row">
            <div class="summary-label">总计</div>
            <div class="summary-value total">${formatMoney(grandTotal)}</div>
          </div>
        </div>
      `;

      // 导出按钮
      html += `
        <div style="margin-top:16px;padding-top:16px;border-top:1.5px solid var(--rule);">
          <button type="button" class="submit-btn" id="btnExportSummaryExcel" style="background:var(--accent2);font-size:13px;padding:12px;">
            📥 导出 Excel
          </button>
        </div>
      `;

      document.getElementById('summaryContent').innerHTML = html;

      // 绑定导出事件
      document.getElementById('btnExportSummaryExcel').addEventListener('click', () => {
        exportSummaryExcel(house, monthPrefix, rentAmount, rentPaid, monthRecs, elecUsed, waterUsed, elecCost, waterCost, utilityTotal, grandTotal);
      });
    }

    function exportSummaryExcel(house, monthPrefix, rentAmount, rentPaid, monthRecs, elecUsed, waterUsed, elecCost, waterCost, utilityTotal, grandTotal) {
      let csv = '\uFEFF'; // BOM for Excel UTF-8
      csv += house.name + ' 月总结 (' + monthPrefix + ')\n\n';
      csv += '项目,金额,备注\n';
      csv += '月租金,' + rentAmount.toFixed(2) + ' 元,' + (rentPaid ? '已收租' : '待收租') + '\n';
      if (monthRecs.length >= 2) {
        csv += '用电量,' + elecUsed.toFixed(1) + ' 度,\n';
        csv += '电费,' + elecCost.toFixed(2) + ' 元,\n';
        csv += '用水量,' + waterUsed.toFixed(1) + ' m³,\n';
        csv += '水费,' + waterCost.toFixed(2) + ' 元,\n';
        csv += '水电合计,' + utilityTotal.toFixed(2) + ' 元,\n';
      }
      csv += '\n应收合计,' + grandTotal.toFixed(2) + ' 元,\n';

      // 水电读数明细
      if (monthRecs.length > 0) {
        csv += '\n水电读数记录\n';
        csv += '日期,电表读数(度),水表读数(m³)\n';
        monthRecs.forEach(r => {
          csv += r.date + ',' + Number(r.elec).toFixed(1) + ',' + Number(r.water).toFixed(1) + '\n';
        });
      }

      const blob = new Blob([csv], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = house.name + '_月总结_' + monthPrefix + '.xls';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Excel 已导出');
    }

    document.getElementById('summaryCloseBtn').addEventListener('click', closeSummary);
    document.getElementById('summaryOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('summaryOverlay')) closeSummary();
    });
    document.getElementById('sumPrevMonth').addEventListener('click', () => {
      summaryMonth--;
      if (summaryMonth < 0) { summaryMonth = 11; summaryYear--; }
      renderSummary();
    });
    document.getElementById('sumNextMonth').addEventListener('click', () => {
      summaryMonth++;
      if (summaryMonth > 11) { summaryMonth = 0; summaryYear++; }
      renderSummary();
    });

    // ===================== 撤回功能 =====================
    let lastUndo = null; // { houseIdx, removedRecord, removedRentRecord, removedBillRecords }
    let pendingDeleteIdx = -1; // 待删除的房子索引

    function undoLastAction() {
      if (!lastUndo) { showToast('没有可撤回的操作'); return; }
      const { houseIdx, removedRecord, removedRentRecord, removedBillRecords } = lastUndo;
      if (removedRecord && houses[houseIdx]) {
        // 删除最后一次添加的水电记录
        houses[houseIdx].records = houses[houseIdx].records.filter(r =>
          !(r.date === removedRecord.date && r.elec === removedRecord.elec && r.water === removedRecord.water)
        );
      }
      if (removedRentRecord && houses[houseIdx]) {
        // 删除最后一次添加的租金记录
        houses[houseIdx].rentRecords = houses[houseIdx].rentRecords.filter(r =>
          !(r.month === removedRentRecord.month && r.amount === removedRentRecord.amount)
        );
      }
      if (removedBillRecords && removedBillRecords.length) {
        // 删除同步到记账本的记录
        removedBillRecords.forEach(id => {
          records = records.filter(rec => rec.id !== id);
        });
      }
      saveHouseData();
      saveData();
      renderHouses();
      renderRecords();
      updateStats();
      renderCharts();
      lastUndo = null;
      showToast('已撤回');
    }
    document.getElementById('houseList').addEventListener('click', function(e) {
      const list = this;
      // 兼容 SVG 点击：从 button 或 svg/path 向上查找
      let target = e.target;
      while (target && target !== list && !target.classList.contains('house-del-btn')) {
        target = target.parentElement;
      }
      const delBtn = target && target.classList.contains('house-del-btn') ? target : null;
      if (delBtn) {
        e.preventDefault();
        e.stopPropagation();
        const idx = parseInt(delBtn.dataset.idx);
        if (isNaN(idx) || idx < 0 || idx >= houses.length) return;
        const houseName = houses[idx].name;
        pendingDeleteIdx = idx;
        document.getElementById('deleteConfirmText').textContent = '确定要删除「' + houseName + '」吗？删除后将同时清除该房子的所有水电记录和收租记录。';
        openModal('deleteConfirmModal');
        return;
      }

      // 月总结按钮
      target = e.target;
      while (target && target !== list && !target.classList.contains('house-summary-btn')) {
        target = target.parentElement;
      }
      const summaryBtn = target && target.classList.contains('house-summary-btn') ? target : null;
      if (summaryBtn) {
        e.preventDefault();
        e.stopPropagation();
        const idx = parseInt(summaryBtn.dataset.idx);
        if (isNaN(idx) || idx < 0 || idx >= houses.length) return;
        openSummary(idx);
        return;
      }

      // 兼容 SVG 点击：查找编辑按钮
      target = e.target;
      while (target && target !== list && !target.classList.contains('house-edit-btn')) {
        target = target.parentElement;
      }
      const editBtn = target && target.classList.contains('house-edit-btn') ? target : null;
      if (editBtn) {
        e.preventDefault();
        e.stopPropagation();
        const idx = parseInt(editBtn.dataset.idx);
        if (isNaN(idx) || idx < 0 || idx >= houses.length) return;
        document.getElementById('newHouseName').value = houses[idx].name;
        document.getElementById('newHouseRent').value = houses[idx].rent || '';
        document.getElementById('btnSubmitHouse').dataset.editIdx = idx;
        openModal('addHouseModal');
        return;
      }

      // 兼容 SVG 点击：查找保存按钮
      target = e.target;
      while (target && target !== list && !target.classList.contains('meter-save-btn')) {
        target = target.parentElement;
      }
      const saveBtn = target && target.classList.contains('meter-save-btn') ? target : null;
      if (!saveBtn) return;

      const idx = parseInt(saveBtn.dataset.idx);
      const action = saveBtn.dataset.action;

      if (action === 'toggle-rent') {
        const now = new Date();
        const monthStr = now.getFullYear() + '-' + (now.getMonth() + 1).toString().padStart(2, '0');
        if (!houses[idx].rentRecords) houses[idx].rentRecords = [];
        const existIdx = houses[idx].rentRecords.findIndex(r => r.month === monthStr);
        if (existIdx >= 0) {
          houses[idx].rentRecords[existIdx].paid = !houses[idx].rentRecords[existIdx].paid;
        } else {
          houses[idx].rentRecords.push({ month: monthStr, amount: houses[idx].rent || 0, paid: true });
        }
        const isPaid = houses[idx].rentRecords.find(r => r.month === monthStr).paid;
        if (isPaid) {
          syncHouseToRecords(houses[idx].name, 'rent_income', houses[idx].rent || 0, monthStr, houses[idx].name + ' 租金');
        }
        saveHouseData();
        renderHouses();
        showToast(isPaid ? '已标记收租，已同步到记账本' : '已取消收租');
      } else {
        const elecInput = document.getElementById('elec_' + idx);
        const waterInput = document.getElementById('water_' + idx);
        const elecVal = elecInput.value !== '' ? parseFloat(elecInput.value) : null;
        const waterVal = waterInput.value !== '' ? parseFloat(waterInput.value) : null;
        const now = new Date();
        const dateStr = now.toISOString().slice(0, 10);
        const monthStr = now.getFullYear() + '-' + (now.getMonth() + 1).toString().padStart(2, '0');
        if (!houses[idx].records) houses[idx].records = [];

        // 获取上一次的读数作为默认值
        const lastRec = houses[idx].records.length > 0 ? houses[idx].records[houses[idx].records.length - 1] : null;
        const finalElec = elecVal !== null ? elecVal : (lastRec ? lastRec.elec : 0);
        const finalWater = waterVal !== null ? waterVal : (lastRec ? lastRec.water : 0);

        // 检查是否与上次记录相同（无变化）
        if (lastRec && lastRec.elec === finalElec && lastRec.water === finalWater) {
          showToast('读数无变化，未记录');
          return;
        }

        // 保存撤回状态
        const oldBillRecords = [...records];

        // 每次都新增一条记录，不覆盖
        houses[idx].records.push({ date: dateStr, elec: finalElec, water: finalWater });
        houses[idx].records.sort((a, b) => a.date.localeCompare(b.date));

        // 计算用量并同步到记账本（首次录入不同步）
        const recs = houses[idx].records;
        const isFirstRecord = recs.length === 1;
        let newBillIds = [];
        if (!isFirstRecord) {
          const latest = recs[recs.length - 1];
          const prev = recs[recs.length - 2];
          const usedElec = Math.max(0, latest.elec - prev.elec);
          const usedWater = Math.max(0, latest.water - prev.water);
          const elecCost = usedElec * elecUnitPrice;
          const waterCost = usedWater * waterUnitPrice;
          if (elecCost > 0) {
            syncHouseToRecords(houses[idx].name, 'elec_income', elecCost, monthStr, houses[idx].name + ' 电费(' + Number(usedElec).toFixed(1) + '度)');
          }
          if (waterCost > 0) {
            syncHouseToRecords(houses[idx].name, 'water_income', waterCost, monthStr, houses[idx].name + ' 水费(' + Number(usedWater).toFixed(1) + 'm³)');
          }
          // 记录新增的记账ID用于撤回
          newBillIds = records.slice(oldBillRecords.length).map(r => r.id);
        }

        // 设置撤回状态
        lastUndo = {
          houseIdx: idx,
          removedRecord: { date: dateStr, elec: finalElec, water: finalWater },
          removedRentRecord: null,
          removedBillRecords: newBillIds
        };

        saveHouseData();
        renderHouses();
        showToast(isFirstRecord ? '首次读数已记录' : '读数已记录，已同步到记账本');
      }
    });

    // 单价设置事件
    document.getElementById('elecPrice').addEventListener('change', (e) => {
      elecUnitPrice = parseFloat(e.target.value) || 0;
      saveHouseData();
      renderHouses();
      showToast('电费单价已更新');
    });
    document.getElementById('waterPrice').addEventListener('change', (e) => {
      waterUnitPrice = parseFloat(e.target.value) || 0;
      saveHouseData();
      renderHouses();
      showToast('水费单价已更新');
    });

    // 添加/编辑房子模态框
    document.getElementById('btnAddHouse').addEventListener('click', () => {
      document.getElementById('newHouseName').value = '';
      document.getElementById('newHouseRent').value = '';
      document.getElementById('btnSubmitHouse').dataset.editIdx = '';
      openModal('addHouseModal');
    });
    document.getElementById('btnUndo').addEventListener('click', undoLastAction);
    document.getElementById('closeAddHouseModal').addEventListener('click', () => closeModal('addHouseModal'));
    document.getElementById('addHouseModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('addHouseModal')) closeModal('addHouseModal');
    });

    // 删除确认模态框事件
    document.getElementById('closeDeleteConfirmModal').addEventListener('click', () => closeModal('deleteConfirmModal'));
    document.getElementById('deleteConfirmModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteConfirmModal')) closeModal('deleteConfirmModal');
    });
    document.getElementById('btnCancelDelete').addEventListener('click', () => {
      pendingDeleteIdx = -1;
      closeModal('deleteConfirmModal');
    });
    document.getElementById('btnConfirmDelete').addEventListener('click', () => {
      if (pendingDeleteIdx >= 0 && pendingDeleteIdx < houses.length) {
        const houseName = houses[pendingDeleteIdx].name;
        houses.splice(pendingDeleteIdx, 1);
        try { saveHouseData(); } catch (e) {}
        renderHouses();
        showToast('已删除 ' + houseName);
      }
      pendingDeleteIdx = -1;
      closeModal('deleteConfirmModal');
    });
    document.getElementById('btnSubmitHouse').addEventListener('click', () => {
      const name = document.getElementById('newHouseName').value.trim();
      const rent = parseFloat(document.getElementById('newHouseRent').value) || 0;
      if (!name) { showToast('请输入房子名称'); return; }
      const editIdx = document.getElementById('btnSubmitHouse').dataset.editIdx;
      if (editIdx !== '' && editIdx !== undefined) {
        houses[parseInt(editIdx)].name = name;
        houses[parseInt(editIdx)].rent = rent;
        showToast('房子已更新');
      } else {
        houses.push({ id: 'house_' + Date.now(), name, rent, records: [], rentRecords: [] });
        showToast('房子已添加');
      }
      saveHouseData();
      renderHouses();
      closeModal('addHouseModal');
    });

    // 页面切换时渲染房屋
    document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = btn.dataset.page;
        if (page === 'house') renderHouses();
      });
    });

    // ===================== 初始化 =====================
    renderRecords();
    updateStats();
    renderCharts();
    renderIconPicker();
  </script>
</body>
</html>
